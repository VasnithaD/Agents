version: '3.8'

services:
  mcp-server:
    build: .
    container_name: mcp-server
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MCP_SERVER_PORT=3000
      - MCP_SERVER_HOST=0.0.0.0
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_OWNER=${GITHUB_OWNER}
      - GITHUB_REPO=${GITHUB_REPO}
      - VSCODE_WORKSPACE_PATH=${VSCODE_WORKSPACE_PATH:-/workspace}
    volumes:
      - ${VSCODE_WORKSPACE_PATH:-.}:/workspace
    restart: unless-stopped
    networks:
      - mcp-network

networks:
  mcp-network:
    driver: bridge
